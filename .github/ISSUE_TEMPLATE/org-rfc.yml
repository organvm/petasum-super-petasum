name: RFC (org-wide)
description: Propose a cross-repo change using the Logic-First Framework.
title: "[RFC] <short title>"
labels: [org-wide, rfc, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        👋 **Welcome!** Use this template to propose significant changes.

        We use the **[Logic-First Framework](../../LOGIC_FRAMEWORK.md)** to evaluate proposals. Please ensure your reasoning is sound and premises are clear.

        > **Tip:** Clear logic gets approved faster than complex arguments.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief explanation of the proposal (1-2 sentences).
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 🧠 Motivation & Premises
      description: What facts or assumptions lead us here? Reference data where possible.
      placeholder: |
        - Current system X is failing because Y (Observed Fact)
        - We assume future load will increase by Z% (Assumption)
        - Therefore, we need a scalable solution (Inference)
    validations:
      required: true

  - type: textarea
    id: reasoning
    attributes:
      label: 🤔 Reasoning & Alternatives
      description: Why is your proposed solution the logical conclusion? What alternatives were rejected and why?
      placeholder: |
        - Alternative A was rejected because...
        - This approach is optimal because...
    validations:
      required: true

  - type: textarea
    id: design
    attributes:
      label: 🏗️ Proposed Design
      description: The detailed technical approach or architecture.
      placeholder: Architecture, rollout plan, components involved...
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 💥 Impact & Dependencies
      description: Who or what will be affected? (Teams, Repos, APIs)
      placeholder: Repos, APIs, contracts, teams...
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: ⚖️ Risks & Mitigations
      description: What could go wrong? How will we handle it?
      placeholder: Risks, fallbacks, unknowns...

  - type: textarea
    id: metrics
    attributes:
      label: 📈 Success Metrics
      description: How will we logically verify success?
      placeholder: Latency < 100ms, adoption > 50%, etc.
