---
name: Process Improvement
description: Suggest improvements to organization-wide processes or workflows
title: "[PROCESS] "
labels: ["process", "org-wide", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### 👋 Help us improve!

        Thank you for taking the time to suggest an improvement. We value your
        feedback on our processes. Please provide as much detail as possible to
        help us understand the context and the solution.

  - type: textarea
    id: current-process
    attributes:
      label: Current Process
      description: Describe the current process or workflow context.
      placeholder: |
        1. First we do X...
        2. Then we do Y...
        3. Finally Z happens.
    validations:
      required: true

  - type: textarea
    id: problems
    attributes:
      label: Problems with Current Process
      description: What specific pain points, inefficiencies, or blockers exist?
      placeholder: >
        e.g., The manual step in step 2 causes a 2-day delay and is prone to
        errors.
    validations:
      required: true

  - type: textarea
    id: proposed-improvement
    attributes:
      label: Proposed Improvement
      description: Describe your suggested solution clearly.
      placeholder: "We should automate step 2 using..."
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: Expected Benefits
      description: How will this improvement help the organization?
      placeholder: >
        e.g., Reduces turnaround time by 50%, eliminates manual error risk.

  - type: checkboxes
    id: affected-areas
    attributes:
      label: Affected Areas
      description: What areas would be impacted by this change?
      options:
        - label: Development workflow
        - label: CI/CD pipeline
        - label: Code review process
        - label: Documentation
        - label: Testing
        - label: Deployment
        - label: Communication
        - label: Governance & Compliance

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Considerations
      description: >
        Any dependencies, risks, or rollout steps we should know about?
      placeholder: "Requires updates to CI secrets, needs team training, etc."

  - type: input
    id: affected-teams
    attributes:
      label: Affected Teams
      description: Which teams would be impacted by this change?
      placeholder: "e.g., All teams, Backend, Frontend"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing issues to avoid duplicates
          required: true
